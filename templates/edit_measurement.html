{% extends "base.html" %}
{% block title %}Edit Measurement{% endblock %}
{% block content %}
<main class="app-wrap app-wrap-narrow">
  <section class="panel form-panel">
    <div class="panel-header">
      <div>
        <p class="eyebrow">Edit Entry</p>
        <h1>Edit Measurement</h1>
        <p>Update the record, then return to the dashboard.</p>
      </div>
    </div>
    {% if form_errors %}
      <div class="error-box">
        {% for error in form_errors %}
          <div>{{ error }}</div>
        {% endfor %}
      </div>
    {% endif %}
    <form method="post" class="entry-form">
      <label>
        <span>Date</span>
        <input type="date" name="entry_date" required value="{{ form_values.entry_date }}">
      </label>
      <label>
        <span>Weight (lbs)</span>
        <input type="number" step="0.01" min="0" name="weight_lbs" required value="{{ form_values.weight_lbs }}">
      </label>
      <label>
        <span>Waist (in)</span>
        <input type="number" step="0.01" min="0" name="waist_in" required value="{{ form_values.waist_in }}">
      </label>
      <label>
        <span>Notes</span>
        <textarea name="notes" rows="4">{{ form_values.notes }}</textarea>
      </label>
      <div class="button-row">
        <button type="submit" class="button button-primary">Save Changes</button>
        <a href="{{ url_for('dashboard') }}" class="button button-secondary">Back</a>
      </div>
    </form>
  </section>
</main>
{% endblock %}
